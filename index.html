<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0f3460" />
  <meta name="description" content="MentorConcursos - Gerenciador de estudos para concursos públicos" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mentor" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
  <title>MentorConcursos</title>
</head>
<body>
  <noscript>
    <div style="padding:20px;color:#fff;background:#1a1a2e;text-align:center;">
      Este aplicativo requer JavaScript habilitado para funcionar.
    </div>
  </noscript>

  <div id="app">
    <main id="main-content" class="main-content">
      <div class="loading-screen">
        <div class="loader"></div>
        <p>Carregando...</p>
      </div>
    </main>

    <nav id="bottom-nav" class="bottom-nav" style="display:none;">
      <button class="nav-item active" data-page="dashboard" aria-label="Dashboard">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Dashboard</span>
      </button>
      <button class="nav-item" data-page="estudar" aria-label="Estudar">
        <span class="nav-icon">📖</span>
        <span class="nav-label">Estudar</span>
      </button>
      <button class="nav-item" data-page="questoes" aria-label="Questões">
        <span class="nav-icon">📝</span>
        <span class="nav-label">Questões</span>
      </button>
      <button class="nav-item" data-page="revisoes" aria-label="Revisões">
        <span class="nav-icon">🔄</span>
        <span class="nav-label">Revisões</span>
        <span id="badge-revisoes" class="nav-badge" style="display:none;">0</span>
      </button>
      <button class="nav-item" data-page="mais" aria-label="Mais">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">Mais</span>
      </button>
    </nav>
  </div>

  <div id="modal-container"></div>
  <div id="toast-container" class="toast-container"></div>

  <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/db.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/backup.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => {
          console.warn('SW falhou:', err);
        });
      });
    }
  </script>
</body>
</html>
